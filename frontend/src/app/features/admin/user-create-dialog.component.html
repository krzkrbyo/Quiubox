<div class="qb-dialog-shell">
  <div class="qb-dialog-hero">
    <span class="qb-dialog-mark">Q</span>
    <div>
      <p class="qb-panel-title">Usuarios</p>
      <h2>{{ title() }}</h2>
    </div>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="qb-dialog-form">
    <label class="qb-native-field">
      <span>Usuario</span>
      <input formControlName="username" autocomplete="off" placeholder="usuario" />
      @if (form.controls.username.touched && form.controls.username.invalid) {
        <small>Usuario requerido.</small>
      }
    </label>
    <label class="qb-native-field">
      <span>Nombres</span>
      <input formControlName="nombres" autocomplete="off" placeholder="Nombres" />
      @if (form.controls.nombres.touched && form.controls.nombres.invalid) {
        <small>Nombres requeridos.</small>
      }
    </label>
    <label class="qb-native-field">
      <span>Apellidos</span>
      <input formControlName="apellidos" autocomplete="off" placeholder="Apellidos" />
      @if (form.controls.apellidos.touched && form.controls.apellidos.invalid) {
        <small>Apellidos requeridos.</small>
      }
    </label>
    <label class="qb-native-field">
      <span>Correo</span>
      <input type="email" formControlName="email" placeholder="usuario@quiubox.local" />
      @if (form.controls.email.touched && form.controls.email.invalid) {
        <small>Correo inválido.</small>
      }
    </label>
    @if (isCreateMode()) {
      <label class="qb-native-field">
        <span>Contraseña</span>
        <input type="password" formControlName="password" autocomplete="new-password" placeholder="••••••••" />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <small>Mínimo 4 caracteres.</small>
        }
      </label>
      <label class="qb-native-field">
        <span>Confirmar contraseña</span>
        <input type="password" formControlName="confirmPassword" autocomplete="new-password" placeholder="••••••••" />
        @if (form.controls.confirmPassword.touched && form.controls.confirmPassword.invalid) {
          <small>Confirma la contraseña.</small>
        }
      </label>
    }
    <label class="qb-native-field qb-role-field">
      <span>Rol</span>
      <select formControlName="role">
        <option value="user">Usuario</option>
        <option value="admin">Administrador</option>
      </select>
    </label>

    @if (errorMessage) {
      <p class="qb-error qb-form-message">{{ errorMessage }}</p>
    }

    <div class="qb-dialog-actions">
      <button mat-button type="button" (click)="close()">Cancelar</button>
      @if (!isViewMode()) {
        <button mat-flat-button color="primary" type="submit" [disabled]="loading">
          {{ actionLabel() }}
        </button>
      }
    </div>
  </form>
</div>

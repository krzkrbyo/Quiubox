<div class="qb-page">
  <h1 class="qb-panel-title">Gestión de usuarios</h1>

  <mat-card class="qb-card qb-mb">
    <h2 class="qb-h2">Nuevo usuario</h2>
    <form [formGroup]="createForm" (ngSubmit)="create()" class="qb-form">
      <mat-form-field appearance="outline">
        <mat-label>Usuario</mat-label>
        <input matInput formControlName="username" autocomplete="off" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Correo</mat-label>
        <input matInput type="email" formControlName="email" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Contraseña</mat-label>
        <input matInput type="password" formControlName="password" autocomplete="new-password" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Rol</mat-label>
        <mat-select formControlName="role">
          <mat-option value="user">Usuario</mat-option>
          <mat-option value="admin">Administrador</mat-option>
        </mat-select>
      </mat-form-field>
      <button mat-flat-button color="primary" type="submit">Crear</button>
    </form>
  </mat-card>

  <mat-card class="qb-card">
    <h2 class="qb-h2">Usuarios</h2>
    <table mat-table [dataSource]="users" class="qb-table mat-elevation-z0">
      <ng-container matColumnDef="username">
        <th mat-header-cell *matHeaderCellDef>Usuario</th>
        <td mat-cell *matCellDef="let row">{{ row.username }}</td>
      </ng-container>
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Correo</th>
        <td mat-cell *matCellDef="let row">{{ row.email }}</td>
      </ng-container>
      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Rol</th>
        <td mat-cell *matCellDef="let row">
          <mat-form-field appearance="outline" class="qb-inline">
            <mat-select [(ngModel)]="roleDraft[row.id]" [ngModelOptions]="{ standalone: true }">
              <mat-option value="user">Usuario</mat-option>
              <mat-option value="admin">Administrador</mat-option>
            </mat-select>
          </mat-form-field>
        </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row">
          <button mat-button type="button" (click)="saveRole(row)">Guardar rol</button>
          <button mat-button type="button" color="warn" (click)="remove(row)">Eliminar</button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </mat-card>
</div>

<div class="qb-login relative overflow-hidden px-4 py-8">
  <mat-card class="qb-card qb-login-card">
    <mat-card-content>
      <div class="qb-login-header">
        <h1>Quiubox</h1>
      </div>
      <form [formGroup]="form" (ngSubmit)="submit()" class="qb-login-form">
        <label class="qb-login-field">
          <span>Usuario</span>
          <input formControlName="username" autocomplete="username" placeholder="admin" />
        </label>
        <label class="qb-login-field">
          <span>Contraseña</span>
          <input type="password" formControlName="password" autocomplete="current-password" placeholder="••••••••" />
        </label>
        @if (errorMessage) {
          <p class="qb-error">{{ errorMessage }}</p>
        }
        <button mat-flat-button color="primary" type="submit" [disabled]="loading">
          {{ loading ? 'Entrando…' : 'Entrar' }}
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
